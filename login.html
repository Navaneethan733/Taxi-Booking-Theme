<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <title>Login - STACKLY Elite Cab Booking</title>
    <!-- Stylesheets -->
    <link href="css/bootstrap.min.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <link rel="shortcut icon" href="images/favicon.webp" type="image/x-icon">
    <link rel="icon" href="images/favicon.webp" type="image/x-icon">

    <!-- Responsive -->
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
</head>

<body>
    <div class="auth-page-wrapper">
        <!-- Image Side -->
        <div class="auth-image-side" style="background-image: url('images/background/2.webp');">
            <div class="auth-image-content">
                <a href="index.html"><img src="images/logo-2.webp" alt="STACKLY"></a>
                <h2>Welcome Back</h2>
                <p>Sign in to manage your rides, review your wallet, and experience the elite STACKLY service.</p>
            </div>
        </div>

        <!-- Form Side -->
        <div class="auth-form-side">
            <div class="auth-form-container">
                <div class="d-flex align-items-center justify-content-between mb-4 d-lg-none">
                     <a href="index.html"><img src="images/logo-2.webp" alt="STACKLY" style="max-height: 40px;"></a>
                </div>
                
                <a href="index.html" class="text-decoration-none d-inline-block mb-4" style="color: var(--theme-color-dark); font-weight: 600;">
                    <i class="fas fa-arrow-left me-2"></i> Go Back
                </a>

                <h3>Sign In</h3>
                <p>Enter your details to access your account.</p>

                <form action="dashboard.html" class="auth-form">
                    <div class="form-group">
                        <label>Email Address</label>
                        <input type="email" class="form-control" placeholder="alex@example.com" required>
                        <i class="far fa-envelope"></i>
                    </div>
                    <div class="form-group">
                        <label>Password</label>
                        <input type="password" class="form-control" placeholder="••••••••" required>
                        <i class="far fa-eye-slash" style="cursor: pointer;"></i>
                    </div>

                    <div class="auth-options">
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" value="" id="rememberMe">
                            <label class="form-check-label" for="rememberMe">Remember me</label>
                        </div>
                        <a href="forgot-password.html">Forgot Password?</a>
                    </div>

                    <button type="submit" class="theme-btn btn-style-one w-100 auth-btn">Sign In</button>
                    
                    <div class="social-login">
                        <p>Or continue with</p>
                        <div class="row">
                            <div class="col-6">
                                <a href="#" class="social-btn"><i class="fab fa-google text-danger fs-5"></i> Google</a>
                            </div>
                            <div class="col-6">
                                <a href="#" class="social-btn"><i class="fab fa-apple fs-5"></i> Apple</a>
                            </div>
                        </div>
                    </div>

                    <div class="auth-bottom">
                        Don't have an account? <a href="signup.html">Sign Up</a>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="js/jquery.js"></script>
    <script src="js/bootstrap.bundle.min.js"></script>
    <script>
        // Simple password toggle logic
        document.querySelector('.fa-eye-slash').addEventListener('click', function (e) {
            const pwdInput = e.target.previousElementSibling;
            if (pwdInput.type === 'password') {
                pwdInput.type = 'text';
                e.target.classList.replace('fa-eye-slash', 'fa-eye');
            } else {
                pwdInput.type = 'password';
                e.target.classList.replace('fa-eye', 'fa-eye-slash');
            }
        });
    </script>
</body>
</html>
